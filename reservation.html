<main class="hero">
    <p class="subtitle">UNE TABLE D'EXCEPTION</p>
    <h2>Réserver votre expérience</h2>

    <section class="form-section">
        <div class="card-container">
            <form class="form-grid">
                <div class="form-group">
                    <label>DATE</label>
                    <input type="date">
                </div>
                <div class="form-group">
                    <label>HEURE</label>
                    <select>
                        <option>12:00</option>
                        <option>13:30</option>
                        <option>19:30</option>
                        <option>21:00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>NOMBRE DE CONVIVES</label>
                    <input type="number" placeholder="2" min="1">
                </div>
                <div class="form-group">
                    <label>TÉLÉPHONE</label>
                    <input type="tel" placeholder="+221 ...">
                </div>
                <div class="form-group full-width">
                    <label>NOTES PARTICULIÈRES (Allergies, Anniversaire...)</label>
                    <textarea rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary full-width" style="border:none; cursor:pointer;">CONFIRMER LA DEMANDE</button>
            </form>
        </div>
    </section>
</main>
