<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVE | LAST SUMMER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">LAST SUMMER</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">LOCATIONS</a></li>
                    <li><a href="menu.html">ORDER</a></li>
                    <li><a href="reservation.html">CATERING</a></li>
                    <li><a href="contact.html">PRESS</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="hero-text">
        <p class="tagline">JOIN US</p>
        <h1 style="font-size: 6vw;">BOOK A TABLE</h1>

        <div style="max-width: 600px; margin: 40px auto; padding: 0 20px;">
            <form id="reservationForm">
                <input type="text" placeholder="NAME" style="width:100%; padding:20px; border:2px solid #000; margin-bottom:10px; font-weight:900;">
                <div style="display: flex; gap: 10px;">
                    <input type="date" style="width:50%; padding:20px; border:2px solid #000; margin-bottom:10px; font-weight:900;">
                    <input type="time" style="width:50%; padding:20px; border:2px solid #000; margin-bottom:10px; font-weight:900;">
                </div>
                <select style="width:100%; padding:20px; border:2px solid #000; margin-bottom:20px; font-weight:900; appearance: none;">
                    <option>2 GUESTS</option>
                    <option>4 GUESTS</option>
                    <option>6+ GUESTS</option>
                </select>
                <button type="submit" class="cta-button" style="width:100%; border:none; cursor:pointer;">CONFIRM BOOKING</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
